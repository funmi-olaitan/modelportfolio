<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Funmi Olaitan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Arial,Helvetica,sans-serif;background:#fff;color:#111;overflow-x:hidden}

/* HERO */
.hero{
  height:100vh;
  background:linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.35)),url("hero1.jpg") center/cover no-repeat;
  display:flex;align-items:center;justify-content:center;text-align:center;color:white
}
.hero h1{font-size:clamp(3.5rem,8vw,7rem);font-weight:300;letter-spacing:8px;line-height:.95}
.hero p{margin-top:18px;font-size:.8rem;letter-spacing:1px;opacity:.8}
.hero a{display:inline-block;margin-top:35px;padding:12px 32px;border:1px solid white;color:white;text-decoration:none;font-size:.7rem;letter-spacing:1px;text-transform:uppercase}

/* ORIGINAL HEADER */
.site-nav{height:50px;padding:0 34px;display:flex;align-items:center;justify-content:space-between;background:#fff}
.logo{font-size:1.25rem;font-weight:300;letter-spacing:.5px;text-transform:uppercase;text-decoration:none;color:#111}
.links{display:flex;gap:28px;margin-left:40px;flex:1}
.links a{text-decoration:none;color:#111;font-size:.78rem;font-weight:300;opacity:1;text-transform:lowercase;transition:opacity .3s ease}
.links a.active{opacity:.35}
.links a:hover{opacity:.55}
.social{display:flex;gap:12px;font-size:.7rem}
.social a{color:#111;text-decoration:none}

/* GALLERY */
.gallery-section{min-height:100vh;padding:25px 7vw 70px}
.gallery-wrap{display:grid;grid-template-columns:120px 1fr 120px;align-items:end;gap:30px}
.gallery-images{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center}
.gallery-images img{width:100%;height:690px;object-fit:cover;display:block;cursor:pointer}

.side-links{font-size:.72rem;color:#777;line-height:1.5;padding-bottom:8px}
.side-links a,.side-links button{display:block;color:#777;text-decoration:none;background:none;border:none;font:inherit;cursor:pointer;padding:0;margin:0}
.side-links a:hover,.side-links button:hover{color:#111}

.gallery-count{margin-top:22px;font-size:.72rem;color:#777;display:flex;align-items:center;justify-content:center;gap:10px}

.grid-icon{width:12px;height:12px;display:grid;grid-template-columns:1fr 1fr;gap:2px;cursor:pointer}
.grid-icon span{width:5px;height:5px;background:#777;display:block}
.grid-icon:hover span{background:#111}

/* COLLAGE */
.editorial-section{padding:90px 8vw 120px}
.editorial-stack{position:relative;height:560px;margin-top:55px}
.editorial-stack img{position:absolute;width:330px;height:430px;object-fit:cover;cursor:pointer}
.img-left{left:20%;top:80px;transform:rotate(-10deg)}
.img-center{left:42%;top:0;z-index:2}
.img-right{right:13%;top:40px;transform:rotate(8deg)}

/* ABOUT */
.about{padding:90px 10vw 120px;max-width:850px;line-height:1.8}
.about h2{font-size:1.7rem;font-weight:300;text-transform:uppercase;letter-spacing:2px;margin-bottom:20px}

/* FULLSCREEN GALLERY */
.fullscreen-gallery{
  position:fixed;
  inset:0;
  background:#fff;
  z-index:999;
  display:none;
  overflow-y:auto;
  padding:30px 6vw 70px;
}
.fullscreen-gallery.active{display:block}

.fullscreen-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:35px;
  position:sticky;
  top:0;
  background:#fff;
  padding:15px 0;
  z-index:5;
}

.fullscreen-logo{
  text-decoration:none;
  color:#111;
  font-size:1rem;
  font-weight:300;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.fullscreen-header h2{
  font-size:.85rem;
  font-weight:300;
  text-transform:lowercase;
  color:#777;
}

.close-gallery{
  border:1px solid #111;
  background:#fff;
  padding:9px 18px;
  cursor:pointer;
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:1px;
}

.all-photos{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.all-photos img{
  width:100%;
  height:620px;
  object-fit:cover;
  cursor:pointer;
}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(255,255,255,.97);display:none;align-items:center;justify-content:center;z-index:1000}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
.close{position:absolute;top:25px;right:35px;font-size:2rem;border:none;background:none;cursor:pointer}

footer{padding:40px;text-align:center;font-size:.7rem;opacity:.5}
</style>
</head>

<body>

<section class="hero" id="home">
  <div>
    <h1>Funmi<br>Olaitan</h1>
    <p>model · creative · portfolio</p>
    <a href="#headshots">Enter</a>
  </div>
</section>

<header class="site-nav">
  <a href="#home" class="logo">Funmi Olaitan</a>
  <nav class="links">
    <a href="#headshots">headshots</a>
    <a href="#fullbody">fullbody</a>
    <a href="#about">about & contact</a>
  </nav>
  <div class="social">
    <a href="https://www.instagram.com/funmes._/" target="_blank">◎</a>
  </div>
</header>

<section class="gallery-section" id="headshots">
  <div class="gallery-images">
    <img src="headshots1.jpg" fetchpriority="high" decoding="async" onclick="openImg(this)">
    <img src="headshots2.jpg" fetchpriority="high" decoding="async" onclick="openImg(this)">
  </div>
</section>

<section class="editorial-section">
  <div class="editorial-stack">
    <img src="headshots3.jpg" fetchpriority="high" decoding="async" class="img-left" onclick="openImg(this)">
    <img src="headshots4.jpg" fetchpriority="high" decoding="async" class="img-center" onclick="openImg(this)">
    <img src="headshots5.jpg" fetchpriority="high" decoding="async" class="img-right" onclick="openImg(this)">
  </div>
</section>

<section class="gallery-section" id="fullbody">
  <div class="gallery-images">
    <img src="fullbody1.jpg" fetchpriority="high" decoding="async" onclick="openImg(this)">
    <img src="fullbody2.jpg" fetchpriority="high" decoding="async" onclick="openImg(this)">
  </div>
</section>

<div class="fullscreen-gallery" id="fullscreenGallery">
  <div class="fullscreen-header">
    <a href="#home" class="fullscreen-logo" onclick="closeFullGallery()">Funmi Olaitan</a>
    <button onclick="closeFullGallery()">Close</button>
  </div>
  <div class="all-photos" id="allPhotos"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="lightImg">
</div>

<script>
const headshotsPhotos=["headshots1.jpg","headshots2.jpg","headshots3.jpg","headshots4.jpg","headshots5.jpg"];
const fullbodyPhotos=["fullbody1.jpg","fullbody2.jpg","fullbody3.jpg","fullbody4.jpg","fullbody5.jpg"];

function openFullGallery(section){
  const photos=section==="fullbody"?fullbodyPhotos:headshotsPhotos;
  const grid=document.getElementById("allPhotos");
  grid.innerHTML="";
  photos.forEach(p=>{
    const img=document.createElement("img");
    img.src=p;
    img.fetchPriority="high";
    img.decoding="async";
    img.onclick=()=>openImg(img);
    grid.appendChild(img);
  });
  document.getElementById("fullscreenGallery").classList.add("active");
}

function closeFullGallery(){
  document.getElementById("fullscreenGallery").classList.remove("active");
}

function openImg(el){
  document.getElementById("lightImg").src=el.src;
  document.getElementById("lightbox").classList.add("active");
}

function closeImg(){
  document.getElementById("lightbox").classList.remove("active");
}
</script>

</body>
</html>
